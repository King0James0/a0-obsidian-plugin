<html>
<head>
  <script type="module">
    import { store } from "/plugins/obsidian/webui/obsidian-store.js";
  </script>
  <style>
    .obsidian-panel { position: absolute; inset: 0; display: flex; background: #1e1e1e; }
    .obsidian-panel iframe { flex: 1; border: 0; width: 100%; height: 100%; }
    /* While the canvas is being resized, make the iframe pointer-transparent so dragging the
       resize handle ACROSS it (shrinking) isn't swallowed by the iframe — the parent's global
       pointermove must keep firing. (Browser/Editor avoid this by not using an iframe.) */
    body.right-canvas-resizing .obsidian-panel iframe { pointer-events: none; }
    .obsidian-status {
      margin: auto; color: #b0b0b0; font: 14px/1.5 system-ui, sans-serif;
      text-align: center; padding: 1.5rem; max-width: 32rem;
    }

    /* --- "Open as window" (floating modal) -------------------------------------------------
       In docked mode the panel fills the rail (position:absolute;inset:0 against the docked
       container). When floated, the modal-inner has NO intrinsic size, and our absolute panel
       has nothing to fill — so it collapsed to a header-only "small rectangle". Mirror the
       built-in Browser/Editor surface: give the floating modal an explicit, resizable,
       draggable size and a body region the absolute panel can fill. Scoped to
       .modal-inner.obsidian-modal, so the docked path is untouched. */
    .modal-inner.obsidian-modal {
      box-sizing: border-box;
      container-type: inline-size;
      width: min(78vw, 1120px);
      height: min(88vh, 900px);
      min-width: min(320px, calc(100vw - 16px));
      min-height: min(480px, calc(100vh - 16px));
      max-width: calc(100vw - 16px);
      max-height: calc(100vh - 16px);
      resize: both;
      border: 1px solid color-mix(in srgb, var(--color-border) 75%, transparent);
      border-radius: 7px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      background: color-mix(in srgb, var(--color-background) 94%, #000 6%);
    }
    .modal-inner.obsidian-modal .modal-header {
      min-height: 34px;
      cursor: move;            /* drag the floating window by its header (matches Browser) */
      user-select: none;
    }
    .modal-inner.obsidian-modal .modal-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      padding: 0;
    }
    .modal-inner.obsidian-modal .modal-bd.obsidian-modal-body {
      box-sizing: border-box;
      position: relative;      /* containing block for the absolute .obsidian-panel */
      height: 100%;
      min-height: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div x-data>
    <template x-if="$store.obsidian">
      <div class="obsidian-panel"
           x-create="$store.obsidian.onMount($el)"
           x-destroy="$store.obsidian.cleanup()">
        <template x-if="$store.obsidian.frameSrc">
          <iframe :src="$store.obsidian.frameSrc" title="Obsidian"
                  allow="clipboard-read; clipboard-write"></iframe>
        </template>
        <template x-if="!$store.obsidian.frameSrc">
          <div class="obsidian-status" x-text="$store.obsidian.status"></div>
        </template>
      </div>
    </template>
  </div>
</body>
</html>
